repos:
  - repo: "https://github.com/pre-commit/pre-commit-hooks"
    rev: v2.3.0
    hooks: []
  - repo: "https://github.com/psf/black"
    rev: 22.10.0
    hooks:
      - id: black
  - repo: "https://github.com/pycqa/isort"
    rev: 5.11.5
    hooks:
      - id: isort
  - repo: "https://github.com/astral-sh/ruff-pre-commit"
    rev: v0.4.0
    hooks:
      - id: ruff
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: ty check
        language: system
        types:
          - python
        pass_filenames: false
